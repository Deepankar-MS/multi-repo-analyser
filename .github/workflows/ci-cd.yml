name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  repository_dispatch:
    types: [project-updated]

jobs:
  run-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout multi-repo-analyser
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone all project repos and execute SKILL.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read projects.json and clone all repos dynamically
          OWNER=$(jq -r '.github_owner' projects.json)
          
          for repo in $(jq -r '.projects[].repo' projects.json); do
            echo "📦 Cloning $OWNER/$repo..."
            git clone https://github.com/$OWNER/$repo.git $repo || \
            gh repo clone $OWNER/$repo $repo || \
            echo "⚠️ Could not clone $repo"
          done
          
          # Install all projects in dependency order
          for proj in $(jq -r '.projects[].name' projects.json); do
            if [ -d "$proj" ]; then
              echo "📥 Installing $proj..."
              pip install -e ./$proj 2>/dev/null || pip install ./$proj || echo "⚠️ Could not install $proj"
            fi
          done
          
          # Run tests for each project
          echo "🧪 Running tests..."
          jq -r '.projects[] | "\(.name)|\(.test_command)"' projects.json | while IFS='|' read -r name cmd; do
            echo "Testing $name..."
            eval "$cmd" || echo "⚠️ Test failed for $name"
          done
          
          # Phase 6: Generate Change Summary and Dependency Reports
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "📊 MULTI-REPOSITORY IMPACT REPORT"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          
          # === SECTION 1: Detailed Change Summary by Repository ===
          echo "## 📝 Change Summary by Repository"
          echo ""
          echo "| Repository | Files Changed | Change Type | Last Commit |"
          echo "|-----------|---------------|-------------|-------------|"
          
          for proj in $(jq -r '.projects[].name' projects.json); do
            if [ -d "$proj" ]; then
              cd "$proj"
              FILES=$(git diff --name-only HEAD~1 2>/dev/null | wc -l || echo "0")
              COMMIT=$(git log -1 --pretty=format:"%s" 2>/dev/null | head -c 50 || echo "N/A")
              
              # Detect change type from commit message
              if echo "$COMMIT" | grep -qi "feat"; then
                TYPE="Feature"
              elif echo "$COMMIT" | grep -qi "fix"; then
                TYPE="Bugfix"
              elif echo "$COMMIT" | grep -qi "refactor"; then
                TYPE="Refactor"
              else
                TYPE="Update"
              fi
              
              echo "| $proj | $FILES | $TYPE | $COMMIT |"
              cd ..
            fi
          done
          
          echo ""
          
          # === SECTION 2: Detailed Changes Per Repository ===
          echo "## 📂 Detailed Changes Per Repository"
          echo ""
          
          for proj in $(jq -r '.projects[].name' projects.json); do
            if [ -d "$proj" ]; then
              cd "$proj"
              
              echo "### 📦 $proj"
              echo ""
              
              # Show files changed
              echo "**Files Modified:**"
              git diff --name-only HEAD~1 2>/dev/null | while read file; do
                echo "- \`$file\`"
              done
              echo ""
              
              # Show new/modified functions (for Python files)
              echo "**Code Changes:**"
              for pyfile in $(git diff --name-only HEAD~1 2>/dev/null | grep "\.py$"); do
                if [ -f "$pyfile" ]; then
                  echo "  📄 \`$pyfile\`:"
                  # Extract function definitions added
                  git diff HEAD~1 -- "$pyfile" 2>/dev/null | grep "^+" | grep -E "^\+def |^\+class |^\+async def " | sed 's/^+/    ➕ Added: /' || true
                  # Extract function definitions removed
                  git diff HEAD~1 -- "$pyfile" 2>/dev/null | grep "^-" | grep -E "^\-def |^\-class |^\-async def " | sed 's/^-/    ➖ Removed: /' || true
                fi
              done
              echo ""
              
              # Show version changes
              if [ -f "pyproject.toml" ]; then
                VERSION=$(grep -E "^version\s*=" pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "N/A")
                echo "**Version:** $VERSION"
              fi
              echo ""
              echo "---"
              
              cd ..
            fi
          done
          
          echo ""
          
          # === SECTION 3: Cross-Repository Dependencies ===
          echo "## 🔗 Cross-Repository Dependencies"
          echo ""
          echo "| Repository | Depends On | Depended By | Breaking Changes |"
          echo "|-----------|------------|-------------|------------------|"
          
          for proj in $(jq -r '.projects[].name' projects.json); do
            DEPS=$(jq -r --arg p "$proj" '.projects[] | select(.name==$p) | .dependencies | join(", ")' projects.json)
            [ -z "$DEPS" ] && DEPS="None"
            
            DEPENDED_BY=$(jq -r --arg p "$proj" '.projects[] | select(.dependencies | index($p)) | .name' projects.json | tr '\n' ', ' | sed 's/,$//')
            [ -z "$DEPENDED_BY" ] && DEPENDED_BY="None"
            
            echo "| $proj | $DEPS | $DEPENDED_BY | No |"
          done
          
          echo ""
          
          # === SECTION 4: Required Updates in Dependent Projects ===
          echo "## 🔄 Required Updates in Dependent Projects"
          echo ""
          
          for proj in $(jq -r '.projects[].name' projects.json); do
            if [ -d "$proj" ]; then
              cd "$proj"
              
              # Check if there are actual changes
              CHANGES=$(git diff --name-only HEAD~1 2>/dev/null | wc -l)
              
              if [ "$CHANGES" -gt 0 ]; then
                # Get dependent projects
                DEPENDED_BY=$(jq -r --arg p "$proj" '.projects[] | select(.dependencies | index($p)) | .name' ../projects.json 2>/dev/null)
                
                if [ -n "$DEPENDED_BY" ]; then
                  echo "### 📦 Changes in \`$proj\` affect:"
                  echo ""
                  
                  # Extract new functions/exports
                  NEW_EXPORTS=""
                  for pyfile in $(git diff --name-only HEAD~1 2>/dev/null | grep "\.py$"); do
                    if [ -f "$pyfile" ]; then
                      FUNCS=$(git diff HEAD~1 -- "$pyfile" 2>/dev/null | grep "^+" | grep -E "^\+def " | sed 's/+def \([a-zA-Z_]*\).*/\1/' | tr '\n' ', ' | sed 's/,$//')
                      if [ -n "$FUNCS" ]; then
                        NEW_EXPORTS="$NEW_EXPORTS$FUNCS, "
                      fi
                    fi
                  done
                  NEW_EXPORTS=$(echo "$NEW_EXPORTS" | sed 's/, $//')
                  
                  for dep in $DEPENDED_BY; do
                    echo "#### 🎯 \`$dep\`"
                    echo ""
                    echo "**Impact:** This project imports from \`$proj\`"
                    echo ""
                    
                    if [ -n "$NEW_EXPORTS" ]; then
                      echo "**New functions available to use:**"
                      echo "\`\`\`python"
                      echo "from $proj import $NEW_EXPORTS"
                      echo "\`\`\`"
                      echo ""
                      echo "**Recommended Actions:**"
                      echo "- ✅ Consider using new functions: \`$NEW_EXPORTS\`"
                      echo "- ✅ Update version requirement if needed"
                      echo "- ⚠️ Run tests to ensure compatibility"
                    else
                      echo "**Recommended Actions:**"
                      echo "- ✅ No code changes required (backward compatible)"
                      echo "- ⚠️ Run tests to verify compatibility"
                    fi
                    echo ""
                  done
                fi
              fi
              
              cd ..
            fi
          done
          
          echo ""
          echo "### Dependency Notes"
          for proj in $(jq -r '.projects[].name' projects.json); do
            DEPENDED_BY=$(jq -r --arg p "$proj" '.projects[] | select(.dependencies | index($p)) | .name' projects.json | tr '\n' ', ' | sed 's/,$//')
            if [ -n "$DEPENDED_BY" ]; then
              echo "- ⚠️ Changes to **$proj** will impact: $DEPENDED_BY"
            fi
          done
          
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ SKILL.md execution complete!"
          echo "═══════════════════════════════════════════════════════════════"
